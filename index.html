<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wizz</title>
    <link rel="stylesheet" href="/src/theme.css">
    <style>
                body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; background-color: var(--background-color); color: var(--text-color); }
                #toolbar { padding: 5px; background-color: var(--toolbar-background); display: flex; gap: 5px; }
                #toolbar button { background-color: var(--button-background); border: 1px solid var(--border-color); color: var(--text-color); padding: 5px 10px; border-radius: 3px; cursor: pointer; }
                #toolbar button:hover { background-color: var(--button-hover-background); }
        #main-content { display: flex; flex-grow: 1; height: calc(100vh - 35px); /* Adjust for toolbar height */ }
                #file-explorer { width: 250px; height: 100%; background-color: #252526; border-right: 1px solid var(--border-color); padding: 10px; overflow-y: auto; }
        #editor-area { display: flex; flex-direction: column; flex-grow: 1; height: 100%; }
                #tab-bar { display: flex; background-color: #2d2d2d; }
                .tab { display: flex; align-items: center; padding: 8px 12px; background-color: #252526; border-right: 1px solid var(--border-color); cursor: pointer; }
                .tab.active { background-color: var(--background-color); }
        .tab-close { margin-left: 8px; cursor: pointer; }
        #editor-container { flex-grow: 1; height: 100%; }
                #chat-sidebar { width: 350px; height: 100%; display: flex; flex-direction: column; background-color: #252526; border-left: 1px solid var(--border-color); }
        #chat-messages { flex-grow: 1; padding: 10px; overflow-y: auto; }
                #chat-input-form { display: flex; padding: 10px; border-top: 1px solid var(--border-color); }
                #chat-input { flex-grow: 1; background-color: #3c3c3c; border: 1px solid #3c3c3c; color: var(--text-color); padding: 8px; border-radius: 3px; }
        #chat-input:focus { outline: none; border-color: #007acc; }
        #chat-send-btn { margin-left: 10px; background-color: #0e639c; color: white; border: none; padding: 8px 12px; border-radius: 3px; cursor: pointer; }
        #chat-send-btn:hover { background-color: #1177bb; }
        .message { margin-bottom: 15px; }
        .message.user { text-align: right; }
        .message-bubble { display: inline-block; padding: 10px; border-radius: 7px; max-width: 90%; }
        .message.user .message-bubble { background-color: #007acc; color: white; }
        .message.ai .message-bubble { background-color: #3c3c3c; }
    </style>
</head>
<body>
    <div id="app-container" style="display: flex; flex-direction: column; height: 100vh; width: 100vw;">
        <div id="toolbar">
            <button id="open-file-btn">Open</button>
            <button id="save-file-btn">Save</button>
            <button id="open-dir-btn">Open Directory</button>
            <button id="settings-btn">Settings</button>
        </div>
        <div id="main-content">
            <div id="file-explorer"></div>
            <div id="editor-area">
                <div id="tab-bar"></div>
                <div id="editor-container"></div>
            </div>
    <div id="chat-sidebar">
        <div id="chat-messages"></div>
        <form id="chat-input-form">
            <input id="chat-input" type="text" placeholder="Type a message..." autocomplete="off">
            <button id="chat-send-btn" type="submit">Send</button>
        </form>
    </div>
    <script type="module" src="/src/renderer.js"></script>
</body>
</html>
